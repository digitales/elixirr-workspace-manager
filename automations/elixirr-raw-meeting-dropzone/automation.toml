version = 1
id = "elixirr-raw-meeting-dropzone"
kind = "cron"
name = "Elixirr Raw Meeting Dropzone"
prompt = "Process unarchived markdown transcripts from ~/Documents/elixirr/raw-meetings using the elixirr-raw-meeting-dropzone workflow.\n\nRun the queue helper first:\n/Users/rosstweedie/.codex/skills/elixirr-workspace-manager/scripts/scan-raw-meetings-dropzone.sh\n\nIf there are no queued transcripts beyond the header row, return a short status note and stop.\n\nFor each queued transcript:\n1. Read the source transcript.\n2. Use the inferred client_slug, meeting_name, date, and default recurring scope.\n3. Create or update the saved note with:\n/Users/rosstweedie/.codex/skills/elixirr-workspace-manager/scripts/capture-meeting-transcript.sh --client <client_slug> --meeting <meeting_name> --date <date> --scope recurring --transcript-file <source_path>\n4. Then apply the elixirr-meeting-notes skill to fill Summary, Decisions, Action Items, Risks / Blockers, and References while preserving the transcript.\n5. Only after the note is saved successfully, archive the raw transcript with:\n/Users/rosstweedie/.codex/skills/elixirr-workspace-manager/scripts/archive-raw-meeting-transcript.sh <source_path>\n\nRouting rules:\n- files inside raw-meetings/<client>/ should stay client-wide, not project-scoped\n- unmatched filenames should route to internal meetings\n- state any date:mtime or client:fallback-internal assumptions in the final status\n- do not archive a source file if processing failed\n\nReturn a concise batch summary listing processed files, destinations, archived files, and any assumptions."
status = "ACTIVE"
rrule = "FREQ=MINUTELY;INTERVAL=15"
model = "gpt-5.4"
reasoning_effort = "medium"
execution_environment = "local"
cwds = ["/Users/rosstweedie/Documents/elixirr"]
