version = 1
id = "elixirr-output-sync"
kind = "cron"
name = "Elixirr Output Sync"
prompt = "Sync local automation outputs into the Elixirr client outputs using the shared publisher helper.\n\nThis committed automation file is intentionally generic and must not include client-specific mappings.\nIn your local installed automation under your Codex home, add the real mappings directly to the command with repeated --mapping NAME SOURCE DESTINATION arguments.\n\nCommand shape:\npython3 <CODEX_HOME>/skills/elixirr-automation-output-publisher/scripts/sync_automation_outputs.py \\\n  --mapping AutomationName /path/to/automation/outputs/automations/name /path/to/client/outputs/automations/name\n\nTreat the mappings in the local installed automation prompt as the source of truth rather than relying on committed config.\nCopy all matching markdown files from each automation-specific outputs/automations/<name>/ folder into the matching Elixirr clients/<client>/outputs/automations/<name>/ folder.\nCreate destination folders if needed. Do not overwrite same-name files. Return a short status summary of what copied, skipped, or failed."
status = "ACTIVE"
rrule = "FREQ=HOURLY;INTERVAL=1"
model = "gpt-5.4"
reasoning_effort = "medium"
execution_environment = "local"
cwds = ["/path/to/elixirr-workspace"]
